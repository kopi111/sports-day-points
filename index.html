<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sports Day Scoreboard</title>
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; color: #0d1e4c; font-family: 'Segoe UI', sans-serif; height: 100%; overflow: hidden; }
    header { background: linear-gradient(180deg, #0d1e4c 0%, #152a6a 100%); padding: 18px 0 22px; text-align: center; position: relative; box-shadow: 0 6px 24px rgba(0,0,0,0.8); border-bottom: 4px solid #ffc72c; }
    header::before { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #c8102e 0%, #c8102e 33%, #ffc72c 33%, #ffc72c 66%, #009b3a 66%, #009b3a 100%); opacity: 0.85; }
    .title { font-size: 54px; font-weight: 900; color: #ffc72c; margin: 0; letter-spacing: 4px; text-shadow: 2px 2px 0 #0a1530, 0 0 20px rgba(255,199,44,0.4); font-family: 'Georgia', serif; }
    .subtitle { font-size: 30px; font-weight: bold; color: white; margin: 4px 0 0; letter-spacing: 3px; }
    .motto { font-size: 14px; color: #ffc72c; letter-spacing: 6px; margin-top: 6px; font-weight: 600; opacity: 0.85; }
    .crest { position: absolute; top: 18px; left: 30px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }
    .trophy { position: absolute; top: 24px; right: 160px; font-size: 46px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    main { display: grid; gap: 16px; padding: 24px; height: calc(100vh - 200px); box-sizing: border-box; }
    .card { position: relative; container-type: size; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2); min-height: 0; min-width: 0; overflow: hidden; border: 2px solid rgba(255,255,255,0.15); background: linear-gradient(180deg, var(--team-color) 0%, color-mix(in srgb, var(--team-color), black 55%) 100%); }
    .card::after { content: ''; position: absolute; top: -40%; left: -40%; width: 180%; height: 180%; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 50%); pointer-events: none; }
    .card .name { position: relative; font-size: clamp(16px, 12cqh, 48px); font-weight: bold; margin-bottom: 6cqh; letter-spacing: 2px; text-align: center; line-height: 1.1; color: var(--text-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.4); }
    .card .score { position: relative; font-family: 'Stencil', 'Impact', sans-serif; font-size: clamp(40px, 50cqh, 220px); color: var(--text-color); line-height: 1; text-shadow: 4px 4px 8px rgba(0,0,0,0.5); }
    .medal { position: absolute; top: 8px; left: 12px; font-size: clamp(24px, 18cqh, 60px); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); z-index: 2; }
    .rank-1 { border-color: #FFD700; box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 40px rgba(255,215,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
    .rank-2 { border-color: #C0C0C0; box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 30px rgba(192,192,192,0.3); }
    .rank-3 { border-color: #CD7F32; box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 30px rgba(205,127,50,0.3); }
  </style>
</head>
<body>
  <header>
    <svg class="crest" width="80" height="90" viewBox="0 0 80 90">
      <defs>
        <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a3a8a"/>
          <stop offset="100%" stop-color="#0a1f4e"/>
        </linearGradient>
      </defs>
      <path d="M40 2 L76 12 L76 48 Q76 72 40 86 Q4 72 4 48 L4 12 Z" fill="url(#shield)" stroke="#ffc72c" stroke-width="3"/>
      <path d="M4 35 L76 35" stroke="#ffc72c" stroke-width="1.5" opacity="0.5"/>
      <text x="40" y="32" text-anchor="middle" fill="#ffc72c" font-family="Georgia, serif" font-weight="bold" font-size="11" letter-spacing="1">JCF</text>
      <text x="40" y="56" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="7" letter-spacing="0.5">SERVE</text>
      <text x="40" y="66" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="7" letter-spacing="0.5">PROTECT</text>
      <text x="40" y="76" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="7" letter-spacing="0.5">REASSURE</text>
    </svg>
    <span class="trophy">🏆</span>
    <h1 class="title" id="title"></h1>
    <h2 class="subtitle" id="subtitle"></h2>
    <div class="motto">THE ALTIMATE SHOW DOWN</div>
  </header>
  <main id="board"></main>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
  <script src="storage.js"></script>
  <script>
    function layout(n) {
      let cols;
      if (n <= 1) cols = 1;
      else if (n <= 4) cols = 2;
      else if (n <= 9) cols = 3;
      else if (n <= 16) cols = 4;
      else cols = 5;
      const rows = Math.ceil(n / cols);
      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    function textColorFor(hex) {
      const h = String(hex || '#888888').replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      const luminance = 0.299 * r + 0.587 * g + 0.114 * b;
      return luminance > 160 ? '#0d1e4c' : '#ffffff';
    }

    function rankTeams(teams) {
      const sorted = teams
        .map((t, i) => ({ i, score: parseFloat(t.score) || 0 }))
        .sort((a, b) => b.score - a.score);
      const rankMap = new Map();
      let currentRank = 0;
      let previousScore = null;
      sorted.forEach((entry, idx) => {
        if (entry.score !== previousScore) currentRank = idx + 1;
        if (entry.score > 0) rankMap.set(entry.i, currentRank);
        previousScore = entry.score;
      });
      return rankMap;
    }

    function refresh() {
      const data = loadData();
      document.getElementById('title').textContent = data.title;
      document.getElementById('subtitle').textContent = data.subtitle;
      document.title = data.title + ' — ' + data.subtitle;
      layout(data.teams.length);
      const ranked = rankTeams(data.teams);
      document.getElementById('board').innerHTML = data.teams.map((t, i) => {
        const rank = ranked.get(i);
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
        const rankClass = rank && rank <= 3 ? ` rank-${rank}` : '';
        const textColor = textColorFor(t.color);
        return `
          <div class="card${rankClass}" style="--team-color:${t.color};--text-color:${textColor}">
            ${medal ? `<span class="medal">${medal}</span>` : ''}
            <div class="name">${t.name}</div>
            <div class="score">${t.score}</div>
          </div>
        `;
      }).join('');
    }

    window.addEventListener('datachanged', refresh);
    refresh();
  </script>
</body>
</html>
